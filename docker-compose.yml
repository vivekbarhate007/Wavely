version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# SentimentPulse — one-command stack
# Usage: docker compose up --build
# ──────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD:-pulse_secret}@postgres:5432/${POSTGRES_DB:-sentimentpulse}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  GROQ_API_KEY: ${GROQ_API_KEY}
  GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentimentpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse} -d ${POSTGRES_DB:-sentimentpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Kafka (KRaft — no Zookeeper) ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"   # fixed cluster ID for KRaft
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Kafka topic initialiser (runs once then exits) ───────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic sentiment.raw.posts \
          --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic sentiment.processed \
          --partitions 1 --replication-factor 1
        echo "Kafka topics ready."

  # ── Scraper Service ──────────────────────────────────────────────────────────
  scraper_service:
    build:
      context: ./backend/scraper_service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      SUBREDDITS: ${SUBREDDITS:-top,ask,show}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-300}
      POSTS_PER_SUBREDDIT: ${POSTS_PER_SUBREDDIT:-25}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Sentiment Service (Read API + WebSocket) ─────────────────────────────────
  sentiment_service:
    build:
      context: ./backend/sentiment_service
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── LangGraph Sentiment Agent ─────────────────────────────────────────────────
  sentiment_agent:
    build:
      context: ./agents
      dockerfile: Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # empty = use nginx proxy
    ports:
      - "3000:80"
    depends_on:
      sentiment_service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
